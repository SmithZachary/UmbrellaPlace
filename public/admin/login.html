<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Umbrella Place</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <img src="/assets/logo.svg" alt="Umbrella Place" />
        <span>Umbrella Place</span>
      </div>
      <h1>Admin Dashboard</h1>
      <p class="login-subtitle">Sign in to manage your leads and agents.</p>

      <div class="login-error" id="login-error"></div>

      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@umbrellaplace.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAxfQsdCF8vO7WHIvyPRUe_nU8ZbLh0YYw",
      authDomain: "umbrellaplace-59c7d.firebaseapp.com",
      projectId: "umbrellaplace-59c7d",
      storageBucket: "umbrellaplace-59c7d.firebasestorage.app",
      messagingSenderId: "86921312365",
      appId: "1:86921312365:web:2209f28924cda05c0ba764",
    });

    const auth = firebase.auth();

    // If already signed in, redirect to dashboard
    auth.onAuthStateChanged((user) => {
      if (user) window.location.href = "/admin";
    });

    const form = document.getElementById("login-form");
    const errorEl = document.getElementById("login-error");
    const btn = document.getElementById("login-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorEl.classList.remove("visible");
      btn.disabled = true;
      btn.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = "/admin";
      } catch (err) {
        let msg = "Invalid email or password.";
        if (err.code === "auth/too-many-requests") msg = "Too many attempts. Try again later.";
        if (err.code === "auth/network-request-failed") msg = "Network error. Check your connection.";
        errorEl.textContent = msg;
        errorEl.classList.add("visible");
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
