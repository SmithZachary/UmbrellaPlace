<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Umbrella Place</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', sans-serif;
        background: #f7f8fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .error-code {
        font-size: 6rem;
        font-weight: 700;
        color: #1a3c6e;
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #1a1a2e;
        margin-bottom: 1rem;
      }
      p {
        color: #5a6478;
        font-size: 1rem;
        max-width: 420px;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .btn {
        display: inline-block;
        padding: 0.85rem 2rem;
        background: #1a3c6e;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        transition: background 0.3s ease;
      }
      .btn:hover { background: #15305a; }
      .brand {
        margin-top: 3rem;
        color: #5a6478;
        font-size: 0.85rem;
      }
      .brand a {
        color: #c9a84c;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="btn">Back to Home</a>
    <div class="brand"><a href="/">Umbrella Place</a></div>
  </body>
</html>
